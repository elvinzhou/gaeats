name: Transient Parking Sync — Submit Batch

on:
  schedule:
    # Daily at 01:00 UTC — 1,500 airports/day uses the full free grounding tier
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      airport:
        description: "Submit a single airport by ICAO code (e.g. KPAO)"
        required: false
        default: ""
      limit:
        description: "Max airports to include in the batch"
        required: false
        default: "1500"
      dry_run:
        description: "Dry run (log without submitting to Gemini or writing to DB)"
        required: false
        type: boolean
        default: false
      force:
        description: "Submit even if a pending job already exists"
        required: false
        type: boolean
        default: false

jobs:
  submit:
    name: Submit Gemini Batch
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Submit batch
        run: |
          ARGS="--limit=${{ inputs.limit || '1500' }}"
          if [ -n "${{ inputs.airport }}" ]; then ARGS="$ARGS --airport=${{ inputs.airport }}"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          if [ "${{ inputs.force }}" = "true" ]; then ARGS="$ARGS --force"; fi
          node scripts/sync-transient-info-submit.js $ARGS
        env:
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

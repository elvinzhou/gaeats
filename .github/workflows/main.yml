name: Run tests
on:
  push:
  pull_request:
jobs:
  build:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Specify your required Node.js version
          cache: 'pnpm' # Caches dependencies for faster subsequent runs
      - name: Install dependencies
        run: pnpm install
      - name: Run Tests
        run: pnpm run test
